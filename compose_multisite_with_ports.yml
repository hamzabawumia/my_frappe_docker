x-common-image: &common-image
  image: ${CUSTOM_IMAGE}:${CUSTOM_TAG}
  pull_policy: ${PULL_POLICY:-never}

services:
  backend:
    <<: *common-image
    depends_on:
      create-site:
        condition: service_completed_successfully
    restart: on-failure
    networks:
      - frappe_network
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}

  configurator:
    <<: *common-image
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: "no"
    networks:
      - frappe_network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        wait-for-it db:3306 -t 60 &&
        wait-for-it redis-cache:6379 -t 60 &&
        wait-for-it redis-queue:6379 -t 60 &&
        echo "Setting up bench configuration..." &&
        ls -1 apps > sites/apps.txt || true &&
        bench set-config -g db_host db &&
        bench set-config -gp db_port 3306 &&
        bench set-config -g redis_cache "redis://redis-cache:6379" &&
        bench set-config -g redis_queue "redis://redis-queue:6379" &&
        bench set-config -g redis_socketio "redis://redis-queue:6379" &&
        bench set-config -gp socketio_port 9000 &&
        echo "Final config:" &&
        cat sites/common_site_config.json
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  create-site:
    <<: *common-image
    depends_on:
      configurator:
        condition: service_completed_successfully
    restart: "no"
    networks:
      - frappe_network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        wait-for-it db:3306 -t 120 &&
        wait-for-it redis-cache:6379 -t 120 &&
        wait-for-it redis-queue:6379 -t 120 &&
        if [ ! -f sites/common_site_config.json ]; then
          echo "ERROR: common_site_config.json not found!" && exit 1;
        fi &&
        if [ ! -d sites/frontend ]; then
          echo "Creating site: frontend" &&
          bench new-site frontend \
            --mariadb-user-host-login-scope='%' \
            --admin-password=${FRAPPE_ADMIN_PASSWORD:-admin} \
            --db-root-username=root \
            --db-root-password=${DB_PASSWORD} \
            --set-default;
        else
          echo "Site already exists, skipping creation";
        fi
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  db:
    image: mariadb:10.6
    restart: on-failure
    networks:
      - frappe_network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--password=${DB_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    <<: *common-image
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started
    restart: on-failure
    networks:
      - frappe_network
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
    ports:
      - "0.0.0.0:8090:8080"
      - "0.0.0.0:8092:8092"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps
      - ./frappe_multi.conf:/etc/nginx/conf.d/frappe_multi.conf

  queue-long:
    <<: *common-image
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    networks:
      - frappe_network
    command: ["bench", "worker", "--queue", "long,default,short"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  queue-short:
    <<: *common-image
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    networks:
      - frappe_network
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  redis-queue:
    image: redis:6.2-alpine
    restart: on-failure
    networks:
      - frappe_network
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    restart: on-failure
    networks:
      - frappe_network

  scheduler:
    <<: *common-image
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    networks:
      - frappe_network
    command: ["bench", "schedule"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  websocket:
    <<: *common-image
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    networks:
      - frappe_network
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:
  apps:

networks:
  frappe_network:
    driver: bridge
