version: "3.8"

x-common-image: &common-image
  image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-latest}
  pull_policy: ${PULL_POLICY:-always}

services:
  backend:
    <<: *common-image
    networks:
      - frappe_network
    depends_on:
      create-site:
        condition: service_completed_successfully
    restart: on-failure
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}

  configurator:
    <<: *common-image
    networks:
      - frappe_network
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: "no"
    entrypoint: ["bash", "-c"]
    command: |
      wait-for-it -t 60 db:3306
      wait-for-it -t 60 redis-cache:6379
      wait-for-it -t 60 redis-queue:6379

      echo "Setting up bench configuration..."
      ls -1 apps > sites/apps.txt
      bench set-config -g db_host $$DB_HOST
      bench set-config -gp db_port $$DB_PORT
      bench set-config -g redis_cache "redis://$$REDIS_CACHE"
      bench set-config -g redis_queue "redis://$$REDIS_QUEUE"
      bench set-config -g redis_socketio "redis://$$REDIS_QUEUE"
      bench set-config -gp socketio_port $$SOCKETIO_PORT

      cat sites/common_site_config.json
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  create-site:
    <<: *common-image
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
    restart: "no"
    entrypoint: ["bash", "-c"]
    command: |
      wait-for-it -t 120 db:3306
      wait-for-it -t 120 redis-cache:6379
      wait-for-it -t 120 redis-queue:6379

      if [ ! -f sites/common_site_config.json ]; then
        echo "ERROR: common_site_config.json not found!"
        exit 1
      fi

      bench new-site frontend \
        --mariadb-user-host-login-scope='%' \
        --admin-password=${ADMIN_PASSWORD:-admin} \
        --db-root-username=root \
        --db-root-password=${DB_PASSWORD} \
        --install-app erpnext \
        --set-default

  db:
    image: mariadb:10.6
    networks:
      - frappe_network
    restart: on-failure
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--password=${DB_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    <<: *common-image
    networks:
      - frappe_network
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started
    restart: on-failure
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps
      - ./frappe_multi.conf:/etc/nginx/conf.d/frappe_multi.conf
    ports:
      - "0.0.0.0:8090:8080"
      - "0.0.0.0:8092:8092"

  queue-long:
    <<: *common-image
    networks:
      - frappe_network
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    command: ["bench", "worker", "--queue", "long,default,short"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  queue-short:
    <<: *common-image
    networks:
      - frappe_network
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  redis-queue:
    image: redis:6.2-alpine
    networks:
      - frappe_network
    restart: on-failure
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    networks:
      - frappe_network
    restart: on-failure

  scheduler:
    <<: *common-image
    networks:
      - frappe_network
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    command: ["bench", "schedule"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

  websocket:
    <<: *common-image
    networks:
      - frappe_network
    depends_on:
      backend:
        condition: service_started
    restart: on-failure
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - apps:/home/frappe/frappe-bench/apps

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:
  apps:

networks:
  frappe_network:
    driver: bridge
